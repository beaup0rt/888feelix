<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | Artiste</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Style spécifique pour le bouton mail */
        .mail-btn {
            margin-top: 20px;
            background: rgba(112, 161, 255, 0.1);
            border-color: rgba(112, 161, 255, 0.4);
        }

        i {
            font-size: 1.3rem;
            width: 25px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contact & Réseaux</h1>
        
        <a href="https://instagram.com/TON_PSEUDO" class="link-card" target="_blank">
            <i class="fab fa-instagram"></i> Instagram
        </a>

        <a href="https://youtube.com/TON_CANAL" class="link-card" target="_blank">
            <i class="fab fa-youtube"></i> YouTube
        </a>

        <a href="https://tiktok.com/@TON_PSEUDO" class="link-card" target="_blank">
            <i class="fab fa-tiktok"></i> TikTok
        </a>

        <a href="https://x.com/TON_PSEUDO" class="link-card" target="_blank">
            <i class="fab fa-x-twitter"></i> X (Twitter)
        </a>

        <a href="mailto:888feelixmgmt@gmail.com" class="link-card mail-btn">
            <i class="fas fa-envelope"></i> Contact Management
        </a>
        
    </div>

</body>
</html>
